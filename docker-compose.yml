version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: intelliicu-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sumeet
      POSTGRES_DB: intelliicu
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: intelliicu-backend
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_NAME=intelliicu
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=Sumeet
      - DEBUG=False
      - AUTH_SECRET_KEY=intelliicu_super_secret_key_change_me_in_production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: intelliicu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgdata:
