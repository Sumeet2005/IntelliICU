name: IntelliICU CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  # ============================================================
  # Backend CI
  # ============================================================
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Backend Dependencies
        run: pip install -r backend/requirements.txt

      - name: Run Python Compile Check
        run: python -m py_compile backend/app/main.py

  # ============================================================
  # Frontend CI
  # ============================================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: |
          rm -rf node_modules
          npm install --include=optional --no-audit --no-fund

      - name: Install Linux Native Build Dependencies
        working-directory: frontend
        run: |
          npm install --no-save @rolldown/binding-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu

      - name: Run Vite Production Build
        working-directory: frontend
        run: npm run build